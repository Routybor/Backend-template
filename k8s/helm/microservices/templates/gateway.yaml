{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "microservices.fullname" . }}-gateway-config
  namespace: {{ .Values.namespace }}
data:
  GATEWAY_PORT: "8080"
  CORE_SERVICE_URL: "http://core-service:8081"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: {{ .Values.keycloak.realm }}
  KEYCLOAK_CLIENT_ID: {{ .Values.keycloak.clientId }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "microservices.fullname" . }}-gateway-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  KEYCLOAK_CLIENT_SECRET: {{ .Values.keycloak.clientSecret }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "microservices.fullname" . }}-gateway-config
            - secretRef:
                name: {{ include "microservices.fullname" . }}-gateway-secret
          resources:
            {{- toYaml .Values.gateway.resources | nindent 10 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: 8080
  selector:
    app: gateway
{{- end }}
