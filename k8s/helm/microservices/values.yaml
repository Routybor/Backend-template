namespace: microservices

keycloak:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.5.0"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  adminUser: admin
  adminPassword: admin
  realm: microservices
  clientId: gateway
  clientSecret: gateway-secret

coreService:
  enabled: true
  replicaCount: 2
  image:
    repository: ultimatetemplate/core-service
    tag: latest
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: ultimatetemplate/gateway
    tag: latest
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: microservices.local
      paths:
        - path: /
          pathType: Prefix
          service: gateway
          port: 80
    - host: keycloak.local
      paths:
        - path: /
          pathType: Prefix
          service: keycloak
          port: 8080

storage:
  className: standard
  keycloakDataSize: 1Gi
