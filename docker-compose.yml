services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: ${KC_DB:-dev-file}
      KC_LOG_LEVEL: INFO
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_PROXY_HEADERS: "forwarded"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: [ "CMD-SHELL", "exec bash -c 'echo > /dev/tcp/127.0.0.1/8080' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - microservices
    restart: unless-stopped

  core-service:
    build:
      context: ./backend/core-service
      dockerfile: Dockerfile
    container_name: core-service
    environment:
      PORT: ${CORE_SERVICE_PORT:-8081}
      GRPC_PORT: ${GRPC_PORT:-9091}
    ports:
      - "${CORE_SERVICE_PORT:-8081}:${CORE_SERVICE_PORT:-8081}"
      - "${GRPC_PORT:-9091}:${GRPC_PORT:-9091}"
    networks:
      - microservices
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: gateway
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      CORE_SERVICE_GRPC: core-service:${GRPC_PORT:-9091}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-gateway}
    ports:
      - "${GATEWAY_PORT:-8080}:${GATEWAY_PORT:-8080}"
    networks:
      - microservices
    depends_on:
      keycloak:
        condition: service_started
      core-service:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M

networks:
  microservices:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  keycloak_data:
